<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innskráning – Hrein Gæði</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f7f8fa;--light:#eef0f5;--mist:#dde1ea;--steel:#8a95a8;--slate:#4a5568;--navy:#111827;--accent:#1a56db;--accent-light:#eff6ff;--green:#057a55;--green-light:#ecfdf5;--red:#dc2626;--red-light:#fef2f2;--radius:12px;--radius-lg:20px;--shadow:0 4px 32px rgba(17,24,39,0.08);--shadow-lg:0 16px 64px rgba(17,24,39,0.14);--transition:0.3s cubic-bezier(0.4,0,0.2,1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;color:var(--navy);background:var(--off);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased;}
.login-wrap{width:100%;max-width:420px;}
.login-brand{text-align:center;margin-bottom:2.5rem;}
.brand-icon{width:56px;height:56px;background:var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.brand-icon svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--navy);}
.brand-sub{font-size:13px;color:var(--steel);margin-top:4px;}
.login-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--mist);padding:2.5rem;box-shadow:var(--shadow);}
.login-title{font-size:18px;font-weight:500;color:var(--navy);margin-bottom:0.5rem;}
.login-sub{font-size:13px;color:var(--steel);margin-bottom:2rem;}
.form-group{margin-bottom:1.1rem;}
.form-label{font-size:12px;color:var(--slate);margin-bottom:5px;display:block;letter-spacing:0.02em;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--mist);border-radius:var(--radius);font-family:'Outfit',sans-serif;font-size:14px;color:var(--navy);background:var(--white);transition:var(--transition);}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,0.08);}
.form-input.error{border-color:var(--red);}
.password-wrap{position:relative;}
.password-wrap .form-input{padding-right:44px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--steel);padding:4px;display:flex;align-items:center;}
.pw-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.error-msg{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.error-msg.show{display:block;}
.btn-login{width:100%;background:var(--navy);color:#fff;border:none;padding:13px;border-radius:50px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:var(--transition);margin-top:0.5rem;}
.btn-login:hover{background:var(--accent);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;}
.login-divider{text-align:center;font-size:12px;color:var(--steel);margin:1.5rem 0;position:relative;}
.login-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--mist);}
.login-divider span{background:var(--white);padding:0 12px;position:relative;}
.role-demo{display:flex;flex-direction:column;gap:8px;}
.demo-btn{background:var(--off);border:1px solid var(--mist);border-radius:var(--radius);padding:10px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;color:var(--slate);text-align:left;transition:var(--transition);display:flex;align-items:center;justify-content:space-between;}
.demo-btn:hover{border-color:var(--accent);color:var(--navy);}
.demo-role{font-size:10px;background:var(--light);color:var(--steel);padding:2px 8px;border-radius:50px;letter-spacing:0.05em;}
.back-home{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:var(--steel);text-decoration:none;transition:color var(--transition);}
.back-home:hover{color:var(--navy);}
.loading-spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="brand-name">Hrein Gæði</div>
    <div class="brand-sub">Starfsmannasvæði</div>
  </div>

  <div class="login-card">
    <div class="login-title">Innskráning</div>
    <div class="login-sub">Skráðu þig inn með netfangi og lykilorði.</div>

    <div class="form-group">
      <label class="form-label">Netfang</label>
      <input class="form-input" id="email" type="email" placeholder="jon@hreingaedi.is" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Lykilorð</label>
      <div class="password-wrap">
        <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw()" type="button">
          <svg id="pw-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="error-msg" id="error-msg">Rangt netfang eða lykilorð. Reyndu aftur.</div>
    </div>

    <button class="btn-login" onclick="doLogin()" id="login-btn">
      <span id="login-text">Skrá inn</span>
      <div class="loading-spinner" id="login-spinner"></div>
    </button>

    <div class="login-divider"><span>Kynningaraðgangar</span></div>

    <div class="role-demo">
      <button class="demo-btn" onclick="demoLogin('admin')">
        <span>admin@hreingaedi.is</span>
        <span class="demo-role">Admin</span>
      </button>
      <button class="demo-btn" onclick="demoLogin('manager')">
        <span>stjornandi@hreingaedi.is</span>
        <span class="demo-role">Stjórnandi</span>
      </button>
      <button class="demo-btn" onclick="demoLogin('worker')">
        <span>starfsm@hreingaedi.is</span>
        <span class="demo-role">Starfsmaður</span>
      </button>
    </div>
  </div>

  <a href="index.html" class="back-home">← Til baka á vefsíðuna</a>
</div>

<script>
// DEMO USERS — replace with Supabase Auth when ready
const demoUsers = {
  'admin@hreingaedi.is':    { password: 'admin123',   role: 'admin',   name: 'Admin' },
  'stjornandi@hreingaedi.is': { password: 'stjorn123', role: 'manager', name: 'Stjórnandi' },
  'starfsm@hreingaedi.is':  { password: 'starfs123',  role: 'worker',  name: 'Starfsmaður' },
};

function togglePw() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function demoLogin(role) {
  const map = { admin: 'admin@hreingaedi.is', manager: 'stjornandi@hreingaedi.is', worker: 'starfsm@hreingaedi.is' };
  const pwMap = { admin: 'admin123', manager: 'stjorn123', worker: 'starfs123' };
  document.getElementById('email').value = map[role];
  document.getElementById('password').value = pwMap[role];
  doLogin();
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const spinner = document.getElementById('login-spinner');
  const text = document.getElementById('login-text');
  const errMsg = document.getElementById('error-msg');

  errMsg.classList.remove('show');
  btn.disabled = true;
  text.style.display = 'none';
  spinner.style.display = 'block';

  // Simulate loading
  await new Promise(r => setTimeout(r, 800));

  // SUPABASE AUTH PLACEHOLDER
  // const { data, error } = await supabase.auth.signInWithPassword({ email, password })
  // if (error) { showError(); return; }
  // const role = data.user.user_metadata.role
  // redirect based on role

  // DEMO LOGIN
  const user = demoUsers[email];
  if (user && user.password === password) {
    localStorage.setItem('hg-user', JSON.stringify({ email, role: user.role, name: user.name }));
    if (user.role === 'worker') {
      window.location.href = 'worker.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  } else {
    spinner.style.display = 'none';
    text.style.display = 'block';
    btn.disabled = false;
    errMsg.classList.add('show');
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
