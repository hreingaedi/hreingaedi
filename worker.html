<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfsmannasvæði – Hrein Gæði</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f7f8fa;--light:#eef0f5;--mist:#dde1ea;--steel:#8a95a8;--slate:#4a5568;--navy:#111827;--accent:#1a56db;--accent-light:#eff6ff;--green:#057a55;--green-light:#ecfdf5;--amber:#d97706;--amber-light:#fffbeb;--radius:12px;--radius-lg:18px;--shadow:0 4px 24px rgba(17,24,39,0.08);--transition:0.25s ease;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;color:var(--navy);background:var(--off);min-height:100vh;-webkit-font-smoothing:antialiased;}
.worker-header{background:var(--navy);padding:1.5rem 1.25rem 4rem;position:relative;overflow:hidden;}
.worker-header::after{content:'';position:absolute;bottom:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,0.04);border-radius:50%;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.header-brand{font-family:'Cormorant Garamond',serif;font-size:18px;color:rgba(255,255,255,0.7);}
.logout-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-family:'Outfit',sans-serif;font-size:12px;display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;transition:var(--transition);}
.logout-btn:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.3);}
.logout-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.worker-greeting{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#fff;margin-bottom:4px;}
.worker-sub{font-size:13px;color:rgba(255,255,255,0.5);}
.content{max-width:480px;margin:-2.5rem auto 0;padding:0 1.25rem 3rem;position:relative;z-index:10;}
.today-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--mist);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow);}
.today-label{font-size:11px;color:var(--steel);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1rem;}
.job-item{border:1px solid var(--mist);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:var(--transition);}
.job-item:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(26,86,219,0.08);}
.job-item:last-child{margin-bottom:0;}
.job-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.job-name{font-size:14px;font-weight:500;color:var(--navy);}
.job-ref{font-size:11px;color:var(--steel);margin-top:1px;}
.job-svc{font-size:12px;color:var(--slate);margin-bottom:6px;}
.job-addr{font-size:12px;color:var(--slate);display:flex;align-items:center;gap:5px;}
.job-addr svg{width:12px;height:12px;fill:none;stroke:var(--steel);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.job-time{font-size:11px;color:var(--steel);margin-top:4px;display:flex;align-items:center;gap:5px;}
.job-time svg{width:12px;height:12px;fill:none;stroke:var(--steel);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:50px;font-weight:500;}
.badge-pending{background:var(--amber-light);color:var(--amber);}
.badge-confirmed{background:var(--green-light);color:var(--green);}
.badge-done{background:var(--accent-light);color:var(--accent);}
.empty-state{text-align:center;padding:2.5rem 1rem;}
.empty-state svg{width:40px;height:40px;fill:none;stroke:var(--mist);stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 1rem;display:block;}
.empty-state p{font-size:14px;color:var(--steel);}
.section-title{font-size:12px;color:var(--steel);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.75rem;margin-top:1.5rem;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.mini-stat{background:var(--white);border:1px solid var(--mist);border-radius:var(--radius);padding:1rem;text-align:center;}
.mini-stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--navy);line-height:1;}
.mini-stat-label{font-size:10px;color:var(--steel);margin-top:4px;letter-spacing:0.03em;}

/* JOB DETAIL SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(17,24,39,0.5);z-index:100;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:1.5rem;max-height:85vh;overflow-y:auto;}
.sheet-handle{width:36px;height:4px;background:var(--mist);border-radius:2px;margin:0 auto 1.5rem;}
.sheet-title{font-size:16px;font-weight:500;color:var(--navy);margin-bottom:1.25rem;}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--light);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--steel);}
.detail-val{font-weight:500;color:var(--navy);text-align:right;max-width:60%;}
.checklist{margin:1.25rem 0;}
.checklist-title{font-size:12px;font-weight:500;color:var(--navy);margin-bottom:0.75rem;letter-spacing:0.03em;}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--light);cursor:pointer;}
.check-item:last-child{border-bottom:none;}
.check-box{width:20px;height:20px;border:1.5px solid var(--mist);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.check-box.checked{background:var(--green);border-color:var(--green);}
.check-box svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.check-box.checked svg{opacity:1;}
.check-label{font-size:13px;color:var(--slate);transition:var(--transition);}
.check-item.done .check-label{color:var(--steel);text-decoration:line-through;}
.sheet-actions{display:flex;flex-direction:column;gap:8px;margin-top:1.5rem;}
.btn-full{width:100%;padding:13px;border-radius:50px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:var(--transition);}
.btn-complete{background:var(--green);color:#fff;}
.btn-complete:hover{background:#046c4e;}
.btn-maps{background:var(--off);color:var(--navy);border:1px solid var(--mist);}
.btn-maps:hover{border-color:var(--navy);}
.progress-ring{display:flex;align-items:center;gap:8px;margin:1rem 0;}
.ring-bar{flex:1;height:4px;background:var(--light);border-radius:2px;}
.ring-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s ease;}
.ring-label{font-size:11px;color:var(--steel);}
body.auth-loading{visibility:hidden;}
</style>
</head>
<body class="auth-loading">

<div class="worker-header">
  <div class="header-top">
    <span class="header-brand">Hrein Gæði</span>
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Útskrá
    </button>
  </div>
  <div class="worker-greeting" id="greeting">Góðan daginn!</div>
  <div class="worker-sub" id="worker-date"></div>
</div>

<div class="content">

  <div class="stats-row">
    <div class="mini-stat"><div class="mini-stat-num" id="ws-today">0</div><div class="mini-stat-label">Í dag</div></div>
    <div class="mini-stat"><div class="mini-stat-num" id="ws-week">0</div><div class="mini-stat-label">Þessa viku</div></div>
    <div class="mini-stat"><div class="mini-stat-num" id="ws-month">0</div><div class="mini-stat-label">Þessa mánuð</div></div>
  </div>

  <div class="today-card">
    <div class="today-label">Verkefni í dag</div>
    <div id="today-jobs"></div>
  </div>

  <div class="section-title">Næstu verkefni</div>
  <div id="upcoming-jobs"></div>

</div>

<!-- JOB DETAIL SHEET -->
<div class="sheet-overlay" id="job-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Verkefni</div>
    <div id="sheet-content"></div>
    <div class="checklist">
      <div class="checklist-title">Þrifaskráning</div>
      <div id="checklist-items"></div>
      <div class="progress-ring">
        <div class="ring-bar"><div class="ring-fill" id="ring-fill" style="width:0%"></div></div>
        <span class="ring-label" id="ring-label">0/0 lokið</span>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-full btn-maps" onclick="openMaps()">
        <span id="sheet-addr-btn">Opna í kortum</span>
      </button>
      <button class="btn-full btn-complete" id="complete-btn" onclick="markDone()">
        Merkja sem lokið ✓
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// SUPABASE CONNECTION
const SUPABASE_URL = 'https://chngznufxfphhppwaafk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNobmd6bnVmeGZwaGhwcHdhYWZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTk2NjgsImV4cCI6MjA5MTA3NTY2OH0.-dyFOhRmI0Ze4gGzcsBnbD_wN_i5XRQLXabiewJXGOk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function formatDate(dateInput) {
  if (!dateInput) return '';
  const d = (dateInput instanceof Date) ? dateInput : new Date(dateInput);
  if (isNaN(d)) return String(dateInput);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

// AUTH
window.currentUser = null;
window.myJobs = [];
window.todayStr = new Date().toISOString().split('T')[0];

async function initAuth() {
  const { data: { session }, error } = await sb.auth.getSession();
  if (error || !session) { window.location.replace('login.html'); return; }

  const { data: meta, error: metaError } = await sb
    .from('users_meta').select('role, full_name').eq('id', session.user.id).single();

  const role = meta?.role;

  if (metaError || !role) { await sb.auth.signOut(); window.location.replace('login.html'); return; }
  if (role !== 'worker') { window.location.replace('dashboard.html'); return; }

  window.currentUser = { id: session.user.id, role, full_name: meta.full_name };

  const firstName = (meta.full_name || '').split(' ')[0] || 'Starfsmaður';
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Góðan morgun' : hour < 18 ? 'Góðan dag' : 'Gott kvöld';
  document.getElementById('greeting').textContent = greet + ', ' + firstName + '!';
  const now = new Date();
  document.getElementById('worker-date').textContent = now.toLocaleDateString('is-IS', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  document.body.classList.remove('auth-loading');
  await loadJobs();
}

async function logout() { await sb.auth.signOut(); window.location.replace('login.html'); }

async function loadJobs() {
  const todayStr = window.todayStr;
  const weekEnd = new Date();
  weekEnd.setDate(weekEnd.getDate() + (7 - weekEnd.getDay() || 7));
  const weekEndStr = weekEnd.toISOString().split('T')[0];

  const { data, error } = await sb
    .from('bookings')
    .select('*')
    .eq('worker_id', window.currentUser.id)
    .gte('date', todayStr)
    .order('date')
    .order('time');

  if (error) { console.error('Error loading jobs:', error); return; }

  window.myJobs = (data || []).map(b => ({
    ref: b.ref,
    name: b.name,
    service: b.service || (b.type === 'home' ? 'Heimilisþrif' : b.type === 'airbnb' ? 'AirBnB þrif' : 'Fyrirtækjaþrif'),
    sqm: b.sqm,
    total: b.total,
    date: b.date,
    time: b.time,
    address: b.address,
    status: b.status,
    notes: b.notes || '',
  }));

  const todayJobs = window.myJobs.filter(j => j.date === todayStr);
  const upcomingJobs = window.myJobs.filter(j => j.date > todayStr).slice(0, 3);

  document.getElementById('ws-today').textContent = todayJobs.length;
  document.getElementById('ws-week').textContent = window.myJobs.filter(j => j.date >= todayStr && j.date <= weekEndStr).length;
  document.getElementById('ws-month').textContent = window.myJobs.length;

  renderTodayJobs(todayJobs);
  renderUpcomingJobs(upcomingJobs);
}

const checklistItems = [
  'Ryksugað á öllum gólfum og teppum',
  'Gólf skúruð og þrifin',
  'Klósett þrifið vandlega',
  'Vaskar hreinsaðir og þrifnir',
  'Speglar þrifnir og pússaðir',
  'Þurrkað af öllum yfirborðsflötum',
  'Rusl tekið út',
];
let checkState = {};
let currentJobRef = null;

function renderTodayJobs(todayJobs) {
  const container = document.getElementById('today-jobs');
  if (!todayJobs || todayJobs.length === 0) {
    container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p>Engin verkefni í dag</p></div>`;
    return;
  }
  container.innerHTML = todayJobs.map(j => `
    <div class="job-item" onclick="openJob('${j.ref}')">
      <div class="job-top">
        <div><div class="job-name">${j.name}</div><div class="job-ref">${j.ref}</div></div>
        <span class="badge badge-${j.status.toLowerCase()}">${j.status === 'Confirmed' ? 'Staðfest' : 'Í bið'}</span>
      </div>
      <div class="job-svc">${j.service} · ${j.sqm}</div>
      <div class="job-addr"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${j.address}</div>
      <div class="job-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${j.time}</div>
      ${j.notes ? `<div style="margin-top:6px;font-size:11px;color:var(--amber);background:var(--amber-light);padding:4px 8px;border-radius:4px;">📝 ${j.notes}</div>` : ''}
    </div>
  `).join('');
}

function renderUpcomingJobs(upcomingJobs) {
  const container = document.getElementById('upcoming-jobs');
  if (!upcomingJobs || upcomingJobs.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = upcomingJobs.map(j => `
    <div class="job-item" onclick="openJob('${j.ref}')">
      <div class="job-top">
        <div><div class="job-name">${j.name}</div><div class="job-ref">${j.ref} · ${formatDate(j.date)}</div></div>
        <span class="badge badge-${j.status.toLowerCase()}">${j.status === 'Confirmed' ? 'Staðfest' : 'Í bið'}</span>
      </div>
      <div class="job-svc">${j.service} · ${j.sqm}</div>
      <div class="job-addr"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${j.address}</div>
      <div class="job-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${j.time}</div>
    </div>
  `).join('');
}

function openJob(ref) {
  currentJobRef = ref;
  const j = (window.myJobs || []).find(j => j.ref === ref);
  document.getElementById('sheet-title').textContent = j.name;
  document.getElementById('sheet-addr-btn').textContent = j.address;
  document.getElementById('sheet-content').innerHTML = `
    <div class="detail-row"><span class="detail-label">Þjónusta</span><span class="detail-val">${j.service}</span></div>
    <div class="detail-row"><span class="detail-label">Stærð</span><span class="detail-val">${j.sqm}</span></div>
    <div class="detail-row"><span class="detail-label">Dagsetning</span><span class="detail-val">${formatDate(j.date)}</span></div>
    <div class="detail-row"><span class="detail-label">Tími</span><span class="detail-val">${j.time}</span></div>
    <div class="detail-row"><span class="detail-label">Heimilisfang</span><span class="detail-val">${j.address}</span></div>
    ${j.notes ? `<div class="detail-row"><span class="detail-label">Athugasemdir</span><span class="detail-val" style="color:var(--amber);">${j.notes}</span></div>` : ''}
  `;
  if (!checkState[ref]) checkState[ref] = Array(checklistItems.length).fill(false);
  renderChecklist(ref);
  document.getElementById('job-sheet').classList.add('open');
}

function renderChecklist(ref) {
  const state = checkState[ref];
  const done = state.filter(Boolean).length;
  document.getElementById('checklist-items').innerHTML = checklistItems.map((item, i) => `
    <div class="check-item ${state[i] ? 'done' : ''}" onclick="toggleCheck('${ref}',${i})">
      <div class="check-box ${state[i] ? 'checked' : ''}">
        <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
      <span class="check-label">${item}</span>
    </div>
  `).join('');
  const pct = Math.round((done / checklistItems.length) * 100);
  document.getElementById('ring-fill').style.width = pct + '%';
  document.getElementById('ring-label').textContent = done + '/' + checklistItems.length + ' lokið';
  const completeBtn = document.getElementById('complete-btn');
  if (done === checklistItems.length) {
    completeBtn.textContent = 'Merkja sem lokið ✓';
    completeBtn.style.opacity = '1';
  } else {
    completeBtn.textContent = 'Merkja sem lokið (' + done + '/' + checklistItems.length + ')';
    completeBtn.style.opacity = '0.6';
  }
}

function toggleCheck(ref, i) {
  checkState[ref][i] = !checkState[ref][i];
  renderChecklist(ref);
}

function markDone() {
  const j = (window.myJobs || []).find(j => j.ref === currentJobRef);
  if (j) { j.status = 'Done'; }
  sb.from('bookings').update({ status: 'Done' }).eq('ref', currentJobRef).then(({ error }) => {
    if (error) console.error('Error marking done:', error);
  });
  document.getElementById('job-sheet').classList.remove('open');
  const ts = window.todayStr;
  renderTodayJobs((window.myJobs || []).filter(j => j.date === ts));
  renderUpcomingJobs((window.myJobs || []).filter(j => j.date > ts).slice(0, 3));
  alert('Verkið ' + currentJobRef + ' hefur verið merkt sem lokið!');
}

function openMaps() {
  const j = (window.myJobs || []).find(j => j.ref === currentJobRef);
  if (j) window.open('https://maps.google.com?q=' + encodeURIComponent(j.address));
}

document.getElementById('job-sheet').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('job-sheet').classList.remove('open');
});

initAuth();
</script>
</body>
</html>
